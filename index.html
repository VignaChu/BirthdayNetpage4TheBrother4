<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>连连看小游戏</title>
    <link rel="stylesheet" href="src/css/index.css">
</head>
<body>
    <main class="stage">
        <section class="shell">
            <div class="topbar">
                <div class="badge">🧩 连连看 · 找到所有配对</div>
                <div class="stats">
                    <div class="pill">步数 <span id="steps">0</span></div>
                    <div class="pill">完成 <span id="matched">0</span>/8</div>
                </div>
            </div>

            <div class="content">
                <div class="hero">
                    <h1>连连看小游戏</h1>
                    <p>翻开两张卡片，如果图案一样就会消除。把全部 8 组配对完成后,就能继续下一关,点击左下角可以打开bgm</p>
                </div>

                <div class="board" id="board" aria-label="连连看棋盘"></div>

                <div>
                    <div class="hud">
                        <div class="panel">
                            <h2>玩法</h2>
                            <p>记住卡片位置，尽量少步数完成。找对所有配对后，会自动进入下一关。</p>
                        </div>
                        <div class="panel">
                            <h2>进度</h2>
                            <p id="status">开始翻牌吧。</p>
                            <div class="bar" aria-hidden="true"><span id="progress"></span></div>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn primary" id="restart" type="button">重新打乱</button>
                </div>
            </div>

            <div class="overlay" id="overlay">
                <div class="result">
                    <h3>配对完成！</h3>
                    <p id="final-text"></p>
                    <div class="actions" style="margin-top: 18px;">
                        <button class="btn primary" id="play-again" type="button">再玩一次</button>
                        <a class="btn secondary" href="src/html/fall-cake.html">进入下一关</a>
                    </div>
                </div>
            </div>

            <button class="music-toggle" id="music-toggle" type="button" aria-label="背景音乐开关" title="背景音乐开关">♫</button>
        </section>
    </main>

    <audio id="bg-music" src="src/audio/birthday.mp3" preload="auto" loop></audio>
    <script src="src/js/index.js"></script>
</body>
</html>
