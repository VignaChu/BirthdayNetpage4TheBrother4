<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日祝福</title>
    <link rel="stylesheet" href="../css/card.css">
</head>
<body>
    <div class="particle-layer" id="particle-layer" aria-hidden="true"></div>
    <main class="stage">
        <section class="card">
            <div class="badge">下一页 · 想对你说的话</div>
            <h1>生日快乐，<span class="highlight">智豪</span></h1>
            <p>
                希望这份小小的惊喜能为你的生日增添一抹温暖的色彩，
                也愿你接下来一年都顺顺利利，心想事成。
            </p>

            <div class="grid">
                <div class="mini">
                    <strong>祝福</strong>
                    愿你每一次努力都被看见，每一次低落都有人接住。
                </div>
                <div class="mini">
                    <strong>回忆</strong>
                    把我们一起笑过的瞬间，留成这份生日礼物的一部分。
                </div>
                <div class="mini">
                    <strong>期待</strong>
                    下一次见面的时候，希望你依旧闪闪发光。
                </div>
            </div>

            <div class="actions">
                <a class="btn primary" href="particle-cake.html">进入下一页</a>
            </div>

            <div class="sparkle"></div>
        </section>
    </main>

    <script src="../js/card.js"></script>
</body>
</html>
